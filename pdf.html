      $('#printJs').click(() => {

          maxWidth: '790',

          base64: true
        });
      });

      /**
       * 이미지를 캔버스에 출력
       */
      function canvasDraw() {
        let imgObj = new Image();

        imgObj.addEventListener('load', function(){
          let ctx = document.getElementById('imgCanvas').getContext("2d");
          ctx.drawImage(imgObj,0,0,127,127);
        }, false);

        imgObj.src = "./assets/report.png";
      }
      canvasDraw();

      $('#savePdf').click(function() { // pdf저장 button id
        html2canvas($('#pdfDiv')[0]).then(function(canvas) { //저장 영역 div id
          let filename = 'REPORT_' + Date.now() + '.pdf';
          let doc = new jsPDF('p', 'mm', 'a4');
          // 캔버스를 이미지로 변환
          const imgData = canvas.toDataURL('image/png');
          
          let imgWidth = 200;// 이미지 가로 길이(mm) / A4 기준 210mm
          let pageHeight = imgWidth * 1.414;// 출력 페이지 세로 길이 계산 A4 기준
          let imgHeight = canvas.height * imgWidth / canvas.width;
          let heightLeft = imgHeight;
          let margin = 10; // 출력 페이지 여백설정
          let position = 0;
          
          // 첫 페이지 출력
          doc.addImage(imgData, 'PNG', margin, position, imgWidth, imgHeight);

          heightLeft -= pageHeight;
          // 한 페이지 이상일 경우 루프 돌면서 출력
          while (heightLeft >= 0) {
              position = heightLeft - imgHeight;
              doc.addPage();
              doc.addImage(imgData, 'PNG', margin, position, imgWidth, imgHeight);
              heightLeft -= pageHeight;
          }
          
          // 파일 저장
          doc.save('file-name.pdf');
        });
      });

      $('#html2Canvas').click(function(){
        html2canvas($('#pdfDiv')[0],{
          logging: true,
          allowTaint: true,
          foreignObjectRendering: true
        }).then(canvas => {
          let imageData = canvas.toDataURL("image/png");
          let a = document.createElement('a');
          a.href = imageData;
          a.download = 'test.jpg';
          a.click();
